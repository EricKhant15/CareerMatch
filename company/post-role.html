<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Internship Role</title>
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="logo"><span class="logo-mark">CM</span><span>Career<span class="brand-purple">Match</span></span></div>
      <div class="user-card"><div class="avatar">G</div><div><strong>Google</strong><span>Company</span></div></div>

      <nav class="nav">
        <a href="dashboard.html">Dashboard</a>
        <a class="active" href="post-role.html">Post Role</a>
        <a href="applicants.html">Applicants</a>
        <a href="interviews.html">Interviews</a>
      </nav>

      <div class="sidebar-bottom">
        <a href="#">Settings</a>
        <a href="../index.html">Sign Out</a>
      </div>
    </aside>

    <main class="main company-main">
      <header class="page-header">
        <div>
          <h1>Post Internship Role</h1>
          <p>Add role requirements so CareerMatch can recommend suitable students.</p>
        </div>
        <a class="primary-btn" href="applicants.html">Publish Draft</a>
      </header>

      <section class="panel">
        <div class="form-grid">
          <div class="form-card"><label>Role Title<input value="Software Developer Intern" /></label></div>
          <div class="form-card"><label>Location<input value="Bangkok" /></label></div>

          <div class="form-card">
            <label>Duration
              <select>
                <option>3 months</option>
                <option>4 months</option>
                <option>6 months</option>
              </select>
            </label>
          </div>

          <div class="form-card">
            <label>Allowance
              <select>
                <option>Paid</option>
                <option>Unpaid</option>
              </select>
            </label>
          </div>

          <div class="form-card">
            <label>Work Mode
              <select>
                <option>On-site</option>
                <option>Hybrid</option>
                <option>Remote</option>
              </select>
            </label>
          </div>

          <div class="form-card">
            <label>Mentorship
              <select>
                <option>Provided</option>
                <option>Not provided</option>
              </select>
            </label>
          </div>
        </div>

        <br />

        <div class="form-card">
          <label>Required Skills
            <input value="Python, SQL, Git, Data Structures" />
          </label>
        </div>

        <br />

        <div class="form-card">
          <label>Job Description
            <textarea>Interns will work with engineering teams to develop and improve scalable software solutions while learning real-world development workflows.</textarea>
          </label>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
